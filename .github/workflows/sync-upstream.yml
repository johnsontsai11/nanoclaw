name: Sync Upstream (NanoClaw Official)

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 12 點自動執行一次
  workflow_dispatch:

# 加入這部分來提前啟用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Your Fork
        # 建議檢查是否有 v5，若無則繼續使用 v4 但搭配上面的 env 變數
        uses: actions/checkout@v4 
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Git Config
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Add Upstream and Sync
        run: |
          git remote add upstream https://github.com/qwibitai/nanoclaw.git || git remote set-url upstream https://github.com/qwibitai/nanoclaw.git
          git fetch upstream main
          
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "No new changes from upstream."
            exit 0
          fi

          if git merge upstream/main --no-edit; then
            echo "Successfully merged upstream changes."
            git push origin main
          else
            echo "Conflict detected! Manual intervention required."
            git merge --abort
            exit 1
          fi